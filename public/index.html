<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>STATIC LINE</title>

<style>
body{margin:0;overflow:hidden;background:#000;color:#2affaa;font-family:monospace}
canvas{display:block}
#menu{position:fixed;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:10px}
input,button{width:260px;padding:10px;font-size:16px}
button{background:#2affaa;border:0;color:#000;font-weight:bold}
#chat{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:none;width:400px}
#msg{position:fixed;top:10px;left:10px;width:300px}
</style>
</head>

<body>

<div id="menu">
  <h1>STATIC LINE</h1>
  <input id="username" placeholder="USERNAME">
  <button id="create">CREATE</button>
  <input id="code" placeholder="CODE">
  <button id="join">JOIN</button>
  <button id="start" style="display:none">START</button>
  <div id="party"></div>
</div>

<div id="msg"></div>
<input id="chat">

<canvas id="c"></canvas>

<script src="/socket.io/socket.io.js"></script>
<script>

const socket = io();
const c = document.getElementById("c");
const ctx = c.getContext("2d");

function resize(){
  c.width = innerWidth;
  c.height = innerHeight;
}
resize();
addEventListener("resize", resize);

const TILE = 64;

const map = [
"####################",
"#..................#",
"#....######........#",
"#..................#",
"#.............######",
"#..................#",
"#....######........#",
"#..................#",
"#..........####....#",
"#..................#",
"#....######........#",
"#..................#",
"#..........####....#",
"#..................#",
"#..................#",
"####################"
];

const player = {x:128,y:128,angle:0,speed:220};
const others = new Map();
const keys = {};

let started = false;
let chatOpen = false;

function wall(x,y){
  const mx = Math.floor(x/TILE);
  const my = Math.floor(y/TILE);
  return !map[my] || map[my][mx] === "#";
}

function move(dt){

  if(chatOpen) return;

  const cos = Math.cos(player.angle);
  const sin = Math.sin(player.angle);

  let dx = 0;
  let dy = 0;

  // forward / back
  if(keys.w || keys.arrowup){
    dx += cos;
    dy += sin;
  }

  if(keys.s || keys.arrowdown){
    dx -= cos;
    dy -= sin;
  }

  // strafe (PERPENDICULAR, correct handed system)
  if(keys.d || keys.arrowright){
    dx += -sin;
    dy += cos;
  }

  if(keys.a || keys.arrowleft){
    dx += sin;
    dy -= cos;
  }

  // IMPORTANT: do NOT normalize movement

  dx *= player.speed * dt;
  dy *= player.speed * dt;

  // axis-separated collision (this is key)
  if(!wall(player.x + dx, player.y)){
    player.x += dx;
  }

  if(!wall(player.x, player.y + dy)){
    player.y += dy;
  }
}

function draw(){

  ctx.clearRect(0,0,c.width,c.height);

  ctx.save();
  ctx.translate(c.width/2-player.x,c.height/2-player.y);

  for(let y=0;y<map.length;y++){
    for(let x=0;x<map[y].length;x++){
      ctx.fillStyle = map[y][x]=="#"?"#2affaa":"#111";
      ctx.fillRect(x*TILE,y*TILE,TILE,TILE);
    }
  }

  ctx.fillStyle="#fff";
  ctx.beginPath();
  ctx.arc(player.x,player.y,10,0,Math.PI*2);
  ctx.fill();

  for(const p of others.values()){
    ctx.fillStyle="#f44";
    ctx.beginPath();
    ctx.arc(p.x,p.y,10,0,Math.PI*2);
    ctx.fill();
  }

  ctx.restore();
}

let last=performance.now(),sent=0;

function loop(t){
  if(!started) return;

  const dt=(t-last)/1000;
  last=t;

  move(dt);
  draw();

  if(t-sent>33){
    socket.emit("move",{x:player.x,y:player.y,angle:player.angle});
    sent=t;
  }

  requestAnimationFrame(loop);
}

addEventListener("keydown",e=>{
  const k=e.key.toLowerCase();

  if(k==="enter"){
    if(chatOpen){
      const v=chat.value.trim();
      if(v) socket.emit("chat",v);
      chat.value="";
      chat.style.display="none";
      chatOpen=false;
    }else{
      chat.style.display="block";
      chat.focus();
      chatOpen=true;
    }
    return;
  }

  keys[k]=true;
});

addEventListener("keyup",e=>{
  keys[e.key.toLowerCase()]=false;
});

addEventListener("mousemove",e=>{
  if(!started||chatOpen) return;
  player.angle+=e.movementX*0.0025;
});

document.getElementById("create").onclick=()=>{
  const u=username.value.trim();
  if(!u)return;
  socket.emit("createParty",u);
};

document.getElementById("join").onclick=()=>{
  socket.emit("joinParty",{
    username:username.value,
    code:code.value
  });
};

document.getElementById("start").onclick=()=>{
  socket.emit("startPartyGame");
};

socket.on("partyCreated",c=>{
  document.getElementById("party").textContent="CODE: "+c;
  document.getElementById("start").style.display="block";
});

socket.on("partyJoined",c=>{
  document.getElementById("party").textContent="CODE: "+c;
});

socket.on("players",p=>{
  others.clear();
  p.forEach(x=>{
    if(x.id!==socket.id) others.set(x.id,x);
  });
});

socket.on("playerMoved",d=>{
  const p=others.get(d.id);
  if(!p)return;
  p.x=d.x;p.y=d.y;p.angle=d.angle;
});

socket.on("gameStarted",()=>{
  document.getElementById("menu").style.display="none";
  started=true;
  last=performance.now();
  requestAnimationFrame(loop);
});

</script>

</body>
</html>
