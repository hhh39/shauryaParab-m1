<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>STATIC LINE</title>

<link rel="icon" href="https://wallpapers.com/images/featured/ghostface-pictures-ofyz28an49x5071b.jpg">

<style>

body{
  margin:0;
  overflow:hidden;
  background:#000;
  font-family:monospace;
}

canvas{
  display:block;
}

#menu{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:10px;
  background:#000;
  z-index:10;
}

input,button{
  width:260px;
  padding:10px;
  font-size:16px;
}

button{
  background:#2affaa;
  border:0;
  font-weight:bold;
  cursor:pointer;
}

#players{
  position:fixed;
  top:10px;
  right:10px;
  width:240px;
  background:rgba(0,0,0,0.8);
  border:2px solid gold;
  padding:10px;
  z-index:20;
  color:white;
}

.playerItem{
  margin:4px 0;
}

#party{
  color:white;
}

#gameOver{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  color:red;
  font-size:42px;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:999;
}

</style>
</head>

<body>

<div id="menu">

  <h1 style="color:#2affaa">
    STATIC LINE
  </h1>

  <input id="username" placeholder="USERNAME">

  <button id="create">
    CREATE
  </button>

  <input id="code" placeholder="CODE">

  <button id="join">
    JOIN
  </button>

  <button id="start" style="display:none">
    START
  </button>

  <div id="party"></div>

</div>

<div id="players">

  <div style="
    color:gold;
    font-weight:bold;
    margin-bottom:8px;
  ">
    PLAYERS:
  </div>

  <div id="playerList"></div>

</div>

<div id="gameOver">

  <div>
    YOU WERE CAUGHT
  </div>

  <button onclick="location.reload()">
    RESTART
  </button>

</div>

<canvas id="c"></canvas>

<script src="/socket.io/socket.io.js"></script>

<script>

window.addEventListener("load",()=>{

/* SOCKET */

const socket = io();

/* DOM */

const c = document.getElementById("c");
const ctx = c.getContext("2d");

const menu = document.getElementById("menu");

const usernameEl =
  document.getElementById("username");

const codeEl =
  document.getElementById("code");

const partyEl =
  document.getElementById("party");

const startBtn =
  document.getElementById("start");

const playerList =
  document.getElementById("playerList");

const gameOverUI =
  document.getElementById("gameOver");

/* CANVAS */

function resize(){

  c.width = innerWidth;
  c.height = innerHeight;
}

resize();

addEventListener("resize",resize);

/* GAME */

let started = false;
let alive = true;

const TILE = 64;
const ENTITY_RADIUS = 12;

/* MAP */

const map = [

"################################################################",
"#..............#.......................#.......................#",
"#.######.######.###########.#########..#.#########.###########.#",
"#.#....#........#.........#.#.......#..#.........#...........#.#",
"#.#.##.##########.#######.#.#.#####.#.##########.###########.#.#",
"#.#.#.............#.....#.#.#.....#.#..........#.#.........#.#.#",
"#.#.#.#############.###.#.#.#####.#.##########.#.#.#####.#.#.#.#",
"#...#.............#...#.#.#.....#.#.#........#.#.#.....#.#.#.#.#",
"#####.###########.###.#.#.#####.#.#.#.######.#.#.#####.#.#.#.#.#",
"#.....#.........#.#...#.#.#.....#.#.#......#.#.#.....#.#.#.#.#.#",
"#.#####.#######.#.#.###.#.#.#####.#.######.#.#.#####.#.#.#.#.#.#",
"#.#.....#.......#.#...#.#.#.#.....#......#.#.#.#.....#.#.#.#.#.#",
"#.#.#####.#######.###.#.#.#.#.##########.#.#.#.#.#####.#.#.#.#.#",
"#.#.....#...........#.#.#.#.#..........#.#.#.#.#.#.....#.#.#.#.#",
"#.#####.#############.#.#.#.##########.#.#.#.#.#.#.#####.#.#.#.#",
"#...............#.......................#...............#.......#",
"#.#############.#.#####################################.#.#####.#",
"#.#...........#.#.....................................#.#.....#.#",
"#.#.#########.#.#####################################.#.#####.#.#",
"#.#.........#.#.......................................#.......#.#",
"#.#########.#.###############################################.#.#",
"#...........#.................................................#.#",
"################################################################"

];

/* SAFE SPAWN FINDER */

function findOpenTile(startBottom=false){

  if(startBottom){

    for(let y=map.length-1;y>=0;y--){

      for(let x=map[y].length-1;x>=0;x--){

        if(map[y][x] === "."){

          return {
            x:x*TILE + TILE/2,
            y:y*TILE + TILE/2
          };
        }
      }
    }

  }else{

    for(let y=0;y<map.length;y++){

      for(let x=0;x<map[y].length;x++){

        if(map[y][x] === "."){

          return {
            x:x*TILE + TILE/2,
            y:y*TILE + TILE/2
          };
        }
      }
    }
  }

  return {
    x:96,
    y:96
  };
}

const playerSpawn =
  findOpenTile(false);

const monsterSpawn =
  findOpenTile(true);

/* PLAYER */

const player = {
  x:playerSpawn.x,
  y:playerSpawn.y,
  angle:0,
  speed:260
};

/* MONSTER */

const monster = {
  x:monsterSpawn.x,
  y:monsterSpawn.y,
  angle:0,
  speed:170
};

const monsterPath = [];

let repathTimer = 0;

/* OTHER PLAYERS */

const others = new Map();

/* INPUT */

const keys = {};

/* COLLISION */

function wall(x,y,r=ENTITY_RADIUS){

  const points = [

    [x-r,y-r],
    [x+r,y-r],
    [x-r,y+r],
    [x+r,y+r]

  ];

  for(const p of points){

    const mx = Math.floor(p[0]/TILE);
    const my = Math.floor(p[1]/TILE);

    if(
      !map[my] ||
      map[my][mx] === "#"
    ){
      return true;
    }
  }

  return false;
}

/* GRID HELPERS */

function toGrid(v){
  return Math.floor(v / TILE);
}

function toWorld(v){
  return v * TILE + TILE/2;
}

/* PLAYER MOVEMENT */

function move(dt){

  if(!alive){
    return;
  }

  let dx = 0;
  let dy = 0;

  if(keys.w || keys.arrowup){
    dy -= 1;
  }

  if(keys.s || keys.arrowdown){
    dy += 1;
  }

  if(keys.a || keys.arrowleft){
    dx -= 1;
  }

  if(keys.d || keys.arrowright){
    dx += 1;
  }

  const len = Math.hypot(dx,dy);

  if(len > 0){

    dx /= len;
    dy /= len;
  }

  dx *= player.speed * dt;
  dy *= player.speed * dt;

  if(!wall(player.x + dx, player.y)){
    player.x += dx;
  }

  if(!wall(player.x, player.y + dy)){
    player.y += dy;
  }
}

/* A* */

function heuristic(ax,ay,bx,by){

  return (
    Math.abs(ax-bx) +
    Math.abs(ay-by)
  );
}

function getNeighbors(x,y){

  const out = [];

  const dirs = [
    [1,0],
    [-1,0],
    [0,1],
    [0,-1]
  ];

  for(const d of dirs){

    const nx = x + d[0];
    const ny = y + d[1];

    if(
      map[ny] &&
      map[ny][nx] &&
      map[ny][nx] !== "#"
    ){
      out.push([nx,ny]);
    }
  }

  return out;
}

function findPath(sx,sy,ex,ey){

  const open = [];
  const closed = new Set();

  open.push({
    x:sx,
    y:sy,
    g:0,
    h:heuristic(sx,sy,ex,ey),
    parent:null
  });

  while(open.length > 0){

    open.sort((a,b)=>
      (a.g+a.h)-(b.g+b.h)
    );

    const current = open.shift();

    const key =
      current.x + "," + current.y;

    if(closed.has(key)){
      continue;
    }

    closed.add(key);

    if(
      current.x === ex &&
      current.y === ey
    ){

      const path = [];

      let c = current;

      while(c){

        path.push({
          x:c.x,
          y:c.y
        });

        c = c.parent;
      }

      return path.reverse();
    }

    const neighbors =
      getNeighbors(current.x,current.y);

    for(const n of neighbors){

      const nx = n[0];
      const ny = n[1];

      const nkey = nx + "," + ny;

      if(closed.has(nkey)){
        continue;
      }

      open.push({
        x:nx,
        y:ny,
        g:current.g + 1,
        h:heuristic(nx,ny,ex,ey),
        parent:current
      });
    }
  }

  return [];
}

/* MONSTER AI */

function updateMonster(dt){

  repathTimer -= dt;

  const sx = toGrid(monster.x);
  const sy = toGrid(monster.y);

  const ex = toGrid(player.x);
  const ey = toGrid(player.y);

  if(repathTimer <= 0){

    monsterPath.length = 0;

    const newPath =
      findPath(sx,sy,ex,ey);

    for(const p of newPath){
      monsterPath.push(p);
    }

    repathTimer = 0.35;
  }

  if(monsterPath.length < 2){
    return;
  }

  const next = monsterPath[1];

  const tx = toWorld(next.x);
  const ty = toWorld(next.y);

  const dx = tx - monster.x;
  const dy = ty - monster.y;

  const dist = Math.hypot(dx,dy);

  if(dist < 6){

    monsterPath.shift();
    return;
  }

  monster.angle =
    Math.atan2(dy,dx);

  const vx =
    Math.cos(monster.angle) *
    monster.speed * dt;

  const vy =
    Math.sin(monster.angle) *
    monster.speed * dt;

  if(!wall(monster.x + vx, monster.y)){
    monster.x += vx;
  }

  if(!wall(monster.x, monster.y + vy)){
    monster.y += vy;
  }
}

/* DRAW */

function draw(){

  ctx.clearRect(0,0,c.width,c.height);

  ctx.save();

  ctx.translate(
    c.width/2 - player.x,
    c.height/2 - player.y
  );

  /* MAZE */

  for(let y=0;y<map.length;y++){

    for(let x=0;x<map[y].length;x++){

      ctx.fillStyle =
        map[y][x] === "#"
        ? "#d4af37"
        : "#fff6bf";

      ctx.fillRect(
        x*TILE,
        y*TILE,
        TILE,
        TILE
      );
    }
  }

  /* OTHER PLAYERS */

  for(const p of others.values()){

    ctx.fillStyle =
      p.alive
      ? "#44f"
      : "#666";

    ctx.beginPath();

    ctx.arc(
      p.x,
      p.y,
      10,
      0,
      Math.PI*2
    );

    ctx.fill();
  }

  /* PLAYER */

  ctx.fillStyle = "#fff";

  ctx.beginPath();

  ctx.arc(
    player.x,
    player.y,
    10,
    0,
    Math.PI*2
  );

  ctx.fill();

  /* MONSTER */

  ctx.save();

  ctx.translate(
    monster.x,
    monster.y
  );

  ctx.rotate(monster.angle);

  ctx.fillStyle = "#000";

  ctx.beginPath();

  ctx.moveTo(14,0);
  ctx.lineTo(-12,-10);
  ctx.lineTo(-12,10);

  ctx.closePath();

  ctx.fill();

  /* EYES */

  ctx.fillStyle = "red";

  ctx.beginPath();
  ctx.arc(0,-4,2,0,Math.PI*2);
  ctx.fill();

  ctx.beginPath();
  ctx.arc(0,4,2,0,Math.PI*2);
  ctx.fill();

  ctx.restore();

  ctx.restore();
}

/* PLAYER LIST */

function updateList(players){

  playerList.innerHTML = "";

  others.clear();

  players.forEach(p=>{

    if(p.id !== socket.id){
      others.set(p.id,p);
    }

    const d =
      document.createElement("div");

    d.className = "playerItem";

    d.textContent =
      p.username +
      (p.id === socket.id
        ? " (YOU)"
        : "") +
      (!p.alive
        ? " (SPECTATOR)"
        : "");

    playerList.appendChild(d);
  });
}

/* LOOP */

let last = performance.now();
let sent = 0;

function loop(t){

  if(!started){
    return;
  }

  const dt =
    (t-last)/1000;

  last = t;

  /* SAFE DT */

  const safeDt =
    Math.min(dt,0.03);

  move(safeDt);

  updateMonster(safeDt);

  draw();

  const dist = Math.hypot(
    player.x - monster.x,
    player.y - monster.y
  );

  if(dist < 30 && alive){

    alive = false;

    socket.emit("died");

    gameOverUI.style.display =
      "flex";

    return;
  }

  if(t - sent > 33){

    socket.emit("move",{
      x:player.x,
      y:player.y,
      angle:player.angle
    });

    sent = t;
  }

  requestAnimationFrame(loop);
}

/* INPUT */

addEventListener("keydown",e=>{

  keys[e.key.toLowerCase()] = true;
});

addEventListener("keyup",e=>{

  keys[e.key.toLowerCase()] = false;
});

addEventListener("mousemove",e=>{

  if(started){

    player.angle +=
      e.movementX * 0.0025;
  }
});

/* BUTTONS */

document
.getElementById("create")
.addEventListener("click",()=>{

  const u =
    usernameEl.value.trim();

  if(!u){
    return;
  }

  socket.emit(
    "createParty",
    u
  );
});

document
.getElementById("join")
.addEventListener("click",()=>{

  socket.emit("joinParty",{
    username:
      usernameEl.value.trim(),
    code:
      codeEl.value.trim()
  });
});

startBtn
.addEventListener("click",()=>{

  socket.emit(
    "startPartyGame"
  );
});

/* SOCKET EVENTS */

socket.on("players",players=>{

  updateList(players);
});

socket.on("playerMoved",data=>{

  const p =
    others.get(data.id);

  if(!p){
    return;
  }

  p.x = data.x;
  p.y = data.y;
  p.angle = data.angle;
});

socket.on("partyCreated",code=>{

  partyEl.textContent =
    "CODE: " + code;

  startBtn.style.display =
    "block";
});

socket.on("partyJoined",code=>{

  partyEl.textContent =
    "CODE: " + code;
});

socket.on("gameStarted",()=>{

  menu.style.display = "none";

  started = true;
  alive = true;

  last = performance.now();

  requestAnimationFrame(loop);
});

});

</script>

</body>
</html>
