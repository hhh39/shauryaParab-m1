<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>STATIC LINE ONLINE</title>

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  overflow:hidden;
  background:black;
  color:#2affaa;
  font-family:monospace;
}

canvas{
  display:block;
}

#menu{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:12px;
  background:black;
  z-index:10;
}

input,button{
  width:280px;
  padding:12px;
  font-size:18px;
}

input{
  background:black;
  color:#2affaa;
  border:2px solid #2affaa;
}

button{
  background:#2affaa;
  color:black;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  opacity:0.9;
}

#messages{
  position:fixed;
  top:20px;
  left:20px;
  width:320px;
  height:240px;
  overflow:hidden;
  border:2px solid #2affaa;
  background:rgba(0,0,0,0.7);
  padding:10px;
}

#chatInput{
  position:fixed;
  left:50%;
  bottom:20px;
  transform:translateX(-50%);
  width:420px;
  display:none;
  background:black;
  color:white;
  border:2px solid #2affaa;
}

#playerList,#partyText{
  white-space:pre-line;
}
</style>
</head>

<body>

<div id="menu">
  <h1>STATIC LINE</h1>

  <input id="username" placeholder="USERNAME" maxlength="16" />

  <button id="createBtn">CREATE PARTY</button>

  <input id="partyCode" placeholder="PARTY CODE" maxlength="6" />

  <button id="joinBtn">JOIN PARTY</button>

  <button id="startGameBtn" style="display:none">START GAME</button>

  <div id="partyText"></div>
  <div id="playerList"></div>
</div>

<div id="messages"></div>
<input id="chatInput" placeholder="TYPE MESSAGE..." maxlength="120"/>

<canvas id="game"></canvas>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
resize();
addEventListener("resize", resize);

const TILE = 64;

const MAP = [
"####################",
"#..................#",
"#....######........#",
"#..................#",
"#.............######",
"#..................#",
"#....######........#",
"#..................#",
"#..........####....#",
"#..................#",
"#....######........#",
"#..................#",
"#..........####....#",
"#..................#",
"#..................#",
"####################"
];

const player = {
  x: TILE * 2,
  y: TILE * 2,
  angle: 0,
  speed: 220
};

const otherPlayers = new Map();
const keys = {};

let gameStarted = false;
let chatOpen = false;
let isAdmin = false;

const menu = document.getElementById("menu");
const messages = document.getElementById("messages");
const chatInput = document.getElementById("chatInput");
const playerList = document.getElementById("playerList");
const partyText = document.getElementById("partyText");

function addMessage(name,text){
  const div = document.createElement("div");
  div.textContent = `[${name}]: ${text}`;
  messages.appendChild(div);

  while(messages.children.length > 8){
    messages.removeChild(messages.firstChild);
  }
}

function wallAt(x,y){
  const mx = Math.floor(x / TILE);
  const my = Math.floor(y / TILE);

  if(!MAP[my]) return true;
  return MAP[my][mx] === "#";
}

function updatePlayer(dt){

  if(chatOpen) return;

  let moveX = 0;
  let moveY = 0;

  // ✅ correct basis vectors
  const forwardX = Math.cos(player.angle);
  const forwardY = Math.sin(player.angle);

  const rightX = Math.cos(player.angle + Math.PI / 2);
  const rightY = Math.sin(player.angle + Math.PI / 2);

  if(keys.w || keys.arrowup){
    moveX += forwardX;
    moveY += forwardY;
  }

  if(keys.s || keys.arrowdown){
    moveX -= forwardX;
    moveY -= forwardY;
  }

  if(keys.d || keys.arrowright){
    moveX += rightX;
    moveY += rightY;
  }

  if(keys.a || keys.arrowleft){
    moveX -= rightX;
    moveY -= rightY;
  }

  const len = Math.hypot(moveX,moveY);

  if(len > 0){
    moveX /= len;
    moveY /= len;
  }

  const nextX = player.x + moveX * player.speed * dt;
  const nextY = player.y + moveY * player.speed * dt;

  if(!wallAt(nextX,player.y)) player.x = nextX;
  if(!wallAt(player.x,nextY)) player.y = nextY;
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.save();
  ctx.translate(
    canvas.width/2 - player.x,
    canvas.height/2 - player.y
  );

  // map
  for(let y=0;y<MAP.length;y++){
    for(let x=0;x<MAP[y].length;x++){
      ctx.fillStyle = MAP[y][x] === "#" ? "#2affaa" : "#111";
      ctx.fillRect(x*TILE,y*TILE,TILE,TILE);
    }
  }

  // player
  ctx.fillStyle = "white";
  ctx.beginPath();
  ctx.arc(player.x,player.y,12,0,Math.PI*2);
  ctx.fill();

  // others
  for(const p of otherPlayers.values()){
    ctx.fillStyle = "red";
    ctx.beginPath();
    ctx.arc(p.x,p.y,12,0,Math.PI*2);
    ctx.fill();
  }

  ctx.restore();
}

let last = performance.now();
let lastSend = 0;

function loop(now){
  if(!gameStarted) return;

  const dt = (now-last)/1000;
  last = now;

  updatePlayer(dt);
  draw();

  if(now-lastSend > 33){
    socket.emit("move",{
      x:player.x,
      y:player.y,
      angle:player.angle
    });
    lastSend = now;
  }

  requestAnimationFrame(loop);
}

addEventListener("keydown",e=>{
  const k = e.key.toLowerCase();

  if(k === "enter"){
    if(chatOpen){
      const v = chatInput.value.trim();
      if(v) socket.emit("chat",v);
      chatInput.value = "";
      chatInput.style.display = "none";
      chatOpen = false;
    } else {
      chatInput.style.display = "block";
      chatInput.focus();
      chatOpen = true;
    }
    return;
  }

  keys[k] = true;
});

addEventListener("keyup",e=>{
  keys[e.key.toLowerCase()] = false;
});

addEventListener("mousemove",e=>{
  if(!gameStarted || chatOpen) return;
  player.angle += e.movementX * 0.0025;
});

document.getElementById("createBtn").onclick = ()=>{
  const u = document.getElementById("username").value.trim();
  if(!u) return;
  player.username = u.toUpperCase();
  isAdmin = true;
  document.getElementById("startGameBtn").style.display = "block";
  socket.emit("createParty",player.username);
};

document.getElementById("joinBtn").onclick = ()=>{
  const u = document.getElementById("username").value.trim();
  const c = document.getElementById("partyCode").value.trim();
  if(!u||!c) return;

  player.username = u.toUpperCase();

  socket.emit("joinParty",{
    username:player.username,
    code:c
  });
};

document.getElementById("startGameBtn").onclick = ()=>{
  if(isAdmin) socket.emit("startPartyGame");
};

socket.on("players",players=>{
  otherPlayers.clear();

  let text = "PLAYERS:\n\n";

  for(const p of players){
    text += `• ${p.username}\n`;
    if(p.id !== socket.id){
      otherPlayers.set(p.id,p);
    }
  }

  playerList.textContent = text;
});

socket.on("playerMoved",data=>{
  const p = otherPlayers.get(data.id);
  if(!p) return;
  p.x = data.x;
  p.y = data.y;
  p.angle = data.angle;
});

socket.on("chat",d=>{
  addMessage(d.username,d.text);
});

socket.on("gameStarted",()=>{
  menu.style.display = "none";
  gameStarted = true;
  last = performance.now();
  requestAnimationFrame(loop);
});

</script>

</body>
</html>
