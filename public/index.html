<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta
  name="viewport"
  content="width=device-width,initial-scale=1.0"
/>

<title>STATIC LINE ONLINE</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  overflow:hidden;
  background:black;
  color:#2affaa;
  font-family:monospace;
}

canvas{
  display:block;
}

#menu{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:12px;
  z-index:10;
}

input,
button{
  width:280px;
  padding:12px;
  font-size:18px;
  font-family:inherit;
}

button{
  background:#2affaa;
  border:none;
  color:black;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  opacity:0.9;
}

#partyText,
#playerList{
  white-space:pre-line;
  text-align:center;
}

#messages{
  position:fixed;
  left:20px;
  top:20px;
  width:320px;
  max-height:240px;
  overflow:hidden;
  padding:10px;
  border:2px solid #2affaa;
  background:rgba(0,0,0,0.75);
}

.message{
  margin-bottom:6px;
  word-break:break-word;
}

#chatInput{
  position:fixed;
  left:50%;
  bottom:20px;
  transform:translateX(-50%);
  width:420px;
  max-width:90vw;
  display:none;
  background:black;
  color:white;
  border:2px solid #2affaa;
}

</style>
</head>
<body>

<div id="menu">

  <h1>STATIC LINE</h1>

  <input
    id="username"
    placeholder="USERNAME"
    maxlength="16"
  />

  <button id="createBtn">
    CREATE PARTY
  </button>

  <input
    id="partyCode"
    placeholder="PARTY CODE"
    maxlength="6"
  />

  <button id="joinBtn">
    JOIN PARTY
  </button>

  <button
    id="startGameBtn"
    style="display:none"
  >
    START GAME
  </button>

  <div id="partyText"></div>

  <div id="playerList"></div>

</div>

<div id="messages"></div>

<input
  id="chatInput"
  placeholder="TYPE MESSAGE..."
  maxlength="120"
/>

<canvas id="game"></canvas>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

const canvas =
  document.getElementById("game");

const ctx =
  canvas.getContext("2d");

function resizeCanvas(){

  canvas.width = innerWidth;
  canvas.height = innerHeight;
}

resizeCanvas();

addEventListener(
  "resize",
  resizeCanvas
);

const TILE = 64;

const map = [
"####################",
"#..................#",
"#....######........#",
"#..................#",
"#.............######",
"#..................#",
"#....######........#",
"#..................#",
"#..........####....#",
"#..................#",
"#....######........#",
"#..................#",
"#..........####....#",
"#..................#",
"#..................#",
"####################"
];

const player = {
  x:TILE * 2,
  y:TILE * 2,
  angle:0,
  speed:220,
  username:"PLAYER"
};

const otherPlayers = new Map();

const keys = {};

let gameStarted = false;
let isAdmin = false;
let chatOpen = false;

const menu =
  document.getElementById("menu");

const messages =
  document.getElementById("messages");

const chatInput =
  document.getElementById("chatInput");

const playerList =
  document.getElementById("playerList");

const partyText =
  document.getElementById("partyText");

function addMessage(name,text){

  const div =
    document.createElement("div");

  div.className = "message";

  div.textContent =
    `[${name}]: ${text}`;

  messages.appendChild(div);

  while(messages.children.length > 8){

    messages.removeChild(
      messages.firstChild
    );
  }
}

function wallAt(x,y){

  const mx =
    Math.floor(x / TILE);

  const my =
    Math.floor(y / TILE);

  if(!map[my]) return true;

  return map[my][mx] === "#";
}

function updatePlayer(dt){

  if(chatOpen) return;

  let moveX = 0;
  let moveY = 0;

  const cos =
    Math.cos(player.angle);

  const sin =
    Math.sin(player.angle);

  if(keys.w){

    moveX += cos;
    moveY += sin;
  }

  if(keys.s){

    moveX -= cos;
    moveY -= sin;
  }

  if(keys.a){

    moveX += sin;
    moveY -= cos;
  }

  if(keys.d){

    moveX -= sin;
    moveY += cos;
  }

  const length =
    Math.hypot(moveX,moveY);

  if(length > 0){

    moveX /= length;
    moveY /= length;
  }

  const nextX =
    player.x +
    moveX * player.speed * dt;

  const nextY =
    player.y +
    moveY * player.speed * dt;

  if(!wallAt(nextX,player.y)){
    player.x = nextX;
  }

  if(!wallAt(player.x,nextY)){
    player.y = nextY;
  }
}

function drawMap(){

  for(let y=0;y<map.length;y++){

    for(let x=0;x<map[y].length;x++){

      if(map[y][x] === "#"){

        ctx.fillStyle = "#2affaa";

      }else{

        ctx.fillStyle = "#111";
      }

      ctx.fillRect(
        x * TILE,
        y * TILE,
        TILE,
        TILE
      );
    }
  }
}

function drawPlayer(x,y,color){

  ctx.fillStyle = color;

  ctx.beginPath();

  ctx.arc(
    x,
    y,
    12,
    0,
    Math.PI * 2
  );

  ctx.fill();
}

function draw(){

  ctx.clearRect(
    0,
    0,
    canvas.width,
    canvas.height
  );

  ctx.save();

  ctx.translate(
    canvas.width / 2 - player.x,
    canvas.height / 2 - player.y
  );

  drawMap();

  drawPlayer(
    player.x,
    player.y,
    "#ffffff"
  );

  for(const other of otherPlayers.values()){

    drawPlayer(
      other.x,
      other.y,
      "#ff4444"
    );
  }

  ctx.restore();
}

let lastTime =
  performance.now();

let lastSent = 0;

function loop(now){

  if(!gameStarted) return;

  const dt =
    (now - lastTime) / 1000;

  lastTime = now;

  updatePlayer(dt);

  draw();

  if(now - lastSent > 33){

    socket.emit("move",{
      x:player.x,
      y:player.y,
      angle:player.angle
    });

    lastSent = now;
  }

  requestAnimationFrame(loop);
}

addEventListener("keydown",e=>{

  const key =
    e.key.toLowerCase();

  if(key === "enter"){

    if(chatOpen){

      const value =
        chatInput.value.trim();

      if(value){

        socket.emit(
          "chat",
          value
        );
      }

      chatInput.value = "";

      chatInput.style.display =
        "none";

      chatOpen = false;

    }else{

      chatInput.style.display =
        "block";

      chatInput.focus();

      chatOpen = true;
    }

    return;
  }

  keys[key] = true;
});

addEventListener("keyup",e=>{

  keys[
    e.key.toLowerCase()
  ] = false;
});

addEventListener(
  "mousemove",
  e=>{

    if(
      !gameStarted ||
      chatOpen
    ) return;

    player.angle +=
      e.movementX * 0.0025;
  }
);

document
.getElementById("createBtn")
.onclick = ()=>{

  const username =
    document
    .getElementById("username")
    .value
    .trim();

  if(!username) return;

  player.username =
    username.toUpperCase();

  isAdmin = true;

  document
  .getElementById(
    "startGameBtn"
  )
  .style.display = "block";

  socket.emit(
    "createParty",
    player.username
  );
};

document
.getElementById("joinBtn")
.onclick = ()=>{

  const username =
    document
    .getElementById("username")
    .value
    .trim();

  const code =
    document
    .getElementById("partyCode")
    .value
    .trim();

  if(!username || !code){
    return;
  }

  player.username =
    username.toUpperCase();

  socket.emit(
    "joinParty",
    {
      username:
        player.username,
      code
    }
  );
};

document
.getElementById(
  "startGameBtn"
)
.onclick = ()=>{

  if(!isAdmin) return;

  socket.emit(
    "startPartyGame"
  );
};

socket.on(
  "partyCreated",
  code=>{

    partyText.textContent =
      `PARTY: ${code}`;
  }
);

socket.on(
  "partyJoined",
  code=>{

    partyText.textContent =
      `PARTY: ${code}`;
  }
);

socket.on(
  "invalidParty",
  ()=>{

    alert(
      "INVALID PARTY CODE"
    );
  }
);

socket.on(
  "players",
  players=>{

    otherPlayers.clear();

    let text =
      "PLAYERS:\n\n";

    for(const p of players){

      text +=
        `• ${p.username}\n`;

      if(p.id !== socket.id){

        otherPlayers.set(
          p.id,
          p
        );
      }
    }

    playerList.textContent =
      text;
  }
);

socket.on(
  "playerMoved",
  data=>{

    const player =
      otherPlayers.get(
        data.id
      );

    if(!player) return;

    player.x = data.x;
    player.y = data.y;
    player.angle = data.angle;
  }
);

socket.on(
  "chat",
  data=>{

    addMessage(
      data.username,
      data.text
    );
  }
);

socket.on(
  "gameStarted",
  ()=>{

    menu.style.display =
      "none";

    gameStarted = true;

    lastTime =
      performance.now();

    requestAnimationFrame(
      loop
    );
  }
);

socket.on(
  "disconnect",
  ()=>{

    alert(
      "DISCONNECTED FROM SERVER"
    );
  }
);

</script>

</body>
</html>
