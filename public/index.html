<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>STATIC LINE</title>

<link rel="icon" href="https://wallpapers.com/images/featured/ghostface-pictures-ofyz28an49x5071b.jpg">

<style>

body{
  margin:0;
  overflow:hidden;
  background:#000;
  font-family:monospace;
  color:#2affaa;
}

canvas{
  display:block;
}

#menu{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:10px;
  z-index:5;
  background:#000;
}

input,button{
  width:260px;
  padding:10px;
  font-size:16px;
}

button{
  background:#2affaa;
  border:0;
  color:#000;
  font-weight:bold;
  cursor:pointer;
}

#chat{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  width:400px;
  display:none;
  z-index:4;
}

#msg{
  position:fixed;
  top:10px;
  left:10px;
  width:300px;
  z-index:4;
  color:white;
}

#players{
  position:fixed;
  right:10px;
  top:10px;
  width:220px;
  background:rgba(0,0,0,0.8);
  border:2px solid gold;
  padding:10px;
  z-index:4;
}

#players h3{
  margin:0 0 10px 0;
  color:gold;
}

.playerItem{
  margin:5px 0;
  font-size:15px;
}

</style>
</head>

<body>

<div id="menu">

  <h1>STATIC LINE</h1>

  <input id="username" placeholder="USERNAME">

  <button id="create">CREATE</button>

  <input id="code" placeholder="CODE">

  <button id="join">JOIN</button>

  <button id="start" style="display:none">START</button>

  <div id="party"></div>

</div>

<div id="players">

  <h3>PLAYERS</h3>

  <div id="playerList"></div>

</div>

<div id="msg"></div>

<input id="chat">

<canvas id="c"></canvas>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

const c = document.getElementById("c");
const ctx = c.getContext("2d");

function resize(){

  c.width = innerWidth;
  c.height = innerHeight;
}

resize();

addEventListener("resize", resize);

const TILE = 64;

/* COLOSSAL MAZE */

const map = [

"################################################################",
"#...............#.................#...............#............#",
"#.#############.#.###############.#.#############.#.##########.#",
"#.#...........#.#.#.............#.#.#...........#.#.#........#.#",
"#.#.#########.#.#.#.###########.#.#.#.#########.#.#.#.######.#.#",
"#.#.#.......#.#.#.#.#.........#.#.#.#.#.......#.#.#.#.#....#.#.#",
"#.#.#.#####.#.#.#.#.#.#######.#.#.#.#.#.#####.#.#.#.#.#.##.#.#.#",
"#.#.#.....#.#.#.#.#.#.......#.#.#.#.#.#.....#.#.#.#.#.#..#.#.#.#",
"#.#.#####.#.#.#.#.#.#######.#.#.#.#.#.#####.#.#.#.#.#.##.#.#.#.#",
"#.#.....#.#.#.#.#.#.......#.#.#.#.#.#.....#.#.#.#.#....#.#.#.#.#",
"#.#####.#.#.#.#.#.#######.#.#.#.#.#.#####.#.#.#.#.######.#.#.#.#",
"#.......#.#.#.#.#.#.......#.#.#.#.#.......#.#.#.#........#.#.#.#",
"#########.#.#.#.#.#.#######.#.#.#.#########.#.#.##########.#.#.#",
"#.........#.#.#.#.#.#.......#.#.#...........#.#............#.#.#",
"#.#########.#.#.#.#.#.#######.#.#############.##############.#.#",
"#...........#.#.#.#.#.........#...............#..............#.#",
"#.###########.#.#.#.###########################.##############.#",
"#.............#...#.............................#..............#",
"################################################################"

];

const player = {
  x:128,
  y:128,
  angle:0,
  speed:240
};

const others = new Map();

const keys = {};

let started = false;
let chatOpen = false;

const COLORS = [
  "#ff4444",
  "#44ff44",
  "#4488ff",
  "#ff44ff",
  "#ffaa00",
  "#00ffff",
  "#ff8888",
  "#88ff88",
  "#ffaaee"
];

function playerColor(id){

  if(id === socket.id){
    return "#ffffff";
  }

  let hash = 0;

  for(let i=0;i<id.length;i++){
    hash += id.charCodeAt(i);
  }

  return COLORS[hash % COLORS.length];
}

function wall(x,y){

  const mx = Math.floor(x / TILE);
  const my = Math.floor(y / TILE);

  return !map[my] || map[my][mx] === "#";
}

/* FIXED STRAFING */

function move(dt){

  if(chatOpen) return;

  let moveX = 0;
  let moveY = 0;

  const forwardX = Math.cos(player.angle);
  const forwardY = Math.sin(player.angle);

  const rightX = Math.cos(player.angle + Math.PI / 2);
  const rightY = Math.sin(player.angle + Math.PI / 2);

  if(keys.w){
    moveX += forwardX;
    moveY += forwardY;
  }

  if(keys.s){
    moveX -= forwardX;
    moveY -= forwardY;
  }

  if(keys.d){
    moveX += rightX;
    moveY += rightY;
  }

  if(keys.a){
    moveX -= rightX;
    moveY -= rightY;
  }

  const len = Math.hypot(moveX, moveY);

  if(len > 0){
    moveX /= len;
    moveY /= len;
  }

  moveX *= player.speed * dt;
  moveY *= player.speed * dt;

  if(!wall(player.x + moveX, player.y)){
    player.x += moveX;
  }

  if(!wall(player.x, player.y + moveY)){
    player.y += moveY;
  }
}

function draw(){

  ctx.clearRect(0,0,c.width,c.height);

  ctx.save();

  ctx.translate(
    c.width / 2 - player.x,
    c.height / 2 - player.y
  );

  /* MAP */

  for(let y=0;y<map.length;y++){

    for(let x=0;x<map[y].length;x++){

      if(map[y][x] === "#"){
        ctx.fillStyle = "#d4af37";
      }else{
        ctx.fillStyle = "#fff6bf";
      }

      ctx.fillRect(
        x * TILE,
        y * TILE,
        TILE,
        TILE
      );
    }
  }

  /* OTHER PLAYERS */

  for(const p of others.values()){

    ctx.fillStyle = playerColor(p.id);

    ctx.beginPath();

    ctx.arc(
      p.x,
      p.y,
      10,
      0,
      Math.PI * 2
    );

    ctx.fill();
  }

  /* CURRENT PLAYER */

  ctx.fillStyle = "#fff";

  ctx.beginPath();

  ctx.arc(
    player.x,
    player.y,
    10,
    0,
    Math.PI * 2
  );

  ctx.fill();

  ctx.restore();
}

function updatePlayerList(players){

  const list = document.getElementById("playerList");

  list.innerHTML = "";

  players.forEach(p=>{

    const div = document.createElement("div");

    div.className = "playerItem";

    div.style.color = playerColor(p.id);

    div.textContent =
      p.username +
      (p.id === socket.id ? " (YOU)" : "");

    list.appendChild(div);
  });
}

let last = performance.now();
let sent = 0;

function loop(t){

  if(!started) return;

  const dt = (t - last) / 1000;

  last = t;

  move(dt);

  draw();

  if(t - sent > 33){

    socket.emit("move",{
      x:player.x,
      y:player.y,
      angle:player.angle
    });

    sent = t;
  }

  requestAnimationFrame(loop);
}

addEventListener("keydown",e=>{

  const k = e.key.toLowerCase();

  if(k === "enter"){

    if(chatOpen){

      const v = chat.value.trim();

      if(v){
        socket.emit("chat",v);
      }

      chat.value = "";

      chat.style.display = "none";

      chatOpen = false;

    }else{

      chat.style.display = "block";

      chat.focus();

      chatOpen = true;
    }

    return;
  }

  keys[k] = true;
});

addEventListener("keyup",e=>{

  keys[e.key.toLowerCase()] = false;
});

addEventListener("mousemove",e=>{

  if(!started || chatOpen) return;

  player.angle += e.movementX * 0.0025;
});

create.onclick = ()=>{

  const u = username.value.trim();

  if(!u) return;

  socket.emit("createParty",u);
};

join.onclick = ()=>{

  socket.emit("joinParty",{
    username:username.value,
    code:code.value
  });
};

start.onclick = ()=>{

  socket.emit("startPartyGame");
};

socket.on("partyCreated",c=>{

  party.textContent = "CODE: " + c;

  start.style.display = "block";
});

socket.on("partyJoined",c=>{

  party.textContent = "CODE: " + c;
});

socket.on("players",p=>{

  others.clear();

  p.forEach(x=>{

    if(x.id !== socket.id){

      others.set(x.id,x);
    }
  });

  updatePlayerList(p);
});

socket.on("playerMoved",d=>{

  const p = others.get(d.id);

  if(!p) return;

  p.x = d.x;
  p.y = d.y;
  p.angle = d.angle;
});

socket.on("chat",d=>{

  msg.innerHTML =
    "<b>" +
    d.username +
    ":</b> " +
    d.text;

  clearTimeout(window.chatTimer);

  window.chatTimer = setTimeout(()=>{

    msg.innerHTML = "";

  },4000);
});

socket.on("gameStarted",()=>{

  menu.style.display = "none";

  started = true;

  last = performance.now();

  requestAnimationFrame(loop);
});

</script>

</body>
</html>
